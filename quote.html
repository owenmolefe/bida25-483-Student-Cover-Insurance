<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Cover - Get a Quote</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
        }
        header {
            background: #003366;
            color: white;
            padding: 20px;
            text-align: center;
        }
        nav {
            background: #004080;
            padding: 15px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }
        main {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }
        form {
            background: #f0f4f8;
            padding: 30px;
            border-radius: 10px;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background: #003366;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
            cursor: pointer;
        }
        footer {
            background: #003366;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

header>
    <h1>📱 Student Cover Insurance 💻</h1>
    <p>Insurance for students, by students</p>
</header>
    
<nav>
    <a href="index.html">Home</a>
    <a href="cover-plans.html">Cover Plans</a>
    <a href="quote.html">Get a Quote</a>
    <a href="how-it-works.html">How It Works</a>
    <a href="contact.html">Contact</a>
</nav>

<main>
    <h2>Request Your Free Quote</h2>
    <p>Fill out the form below. We'll get back to you within 24 hours.</p>

    <form id="quoteForm">
        <label>Full Name *</label>
        <input type="text" id="fullName" required>

        <label>Student Email *</label>
        <input type="email" id="email" required>

        <label>Phone Number</label>
        <input type="tel" id="phone">

        <label>Device to Insure *</label>
        <select id="device" required>
            <option value="">Select device</option>
            <option value="Laptop">Laptop only</option>
            <option value="Phone">Phone only</option>
            <option value="Laptop + Phone">Laptop + Phone</option>
            <option value="Laptop + Phone + Tablet">Laptop + Phone + Tablet</option>
        </select>

        <label>Preferred Plan *</label>
        <select id="plan" required>
            <option value="">Select plan</option>
            <option value="Basic (P50/month)">Basic (P50/month)</option>
            <option value="Standard (P90/month)">Standard (P90/month)</option>
            <option value="Premium (P150/month)">Premium (P150/month)</option>
        </select>

        <label>Additional Information</label>
        <textarea id="message" rows="3"></textarea>

        <button type="submit">Submit Quote Request</button>
    </form>

    <div id="confirmationMessage" style="margin-top: 20px; padding: 15px; border-radius: 5px; display: none;"></div>
</main>

<footer>
    <p>&copy; 2026 Student Cover Insurance | Email: hello@studentcover.co.bw</p>
</footer>

<script>
    document.getElementById('quoteForm').addEventListener('submit', function(event) {
        event.preventDefault();  // Prevents page from reloading
        
        // Get values from form
        let name = document.getElementById('fullName').value;
        let email = document.getElementById('email').value;
        let device = document.getElementById('device').value;
        let plan = document.getElementById('plan').value;
        
        // Check if required fields are empty
        if (name === "" || email === "" || device === "" || plan === "") {
            alert("Please fill in all required fields.");
            return;
        }
        
        // Show success message
        let messageDiv = document.getElementById('confirmationMessage');
        messageDiv.innerHTML = "✅ Thank you, " + name + "! Your quote request has been sent to " + email + ". We'll contact you within 24 hours about the " + plan + " plan for your " + device + ".";
        messageDiv.style.backgroundColor = "#d4edda";
        messageDiv.style.color = "#155724";
        messageDiv.style.display = "block";
        
        // Clear the form (optional)
        document.getElementById('quoteForm').reset();
        
        // Scroll to message
        messageDiv.scrollIntoView({ behavior: 'smooth' });
    });
</script>

</body>
</html>
